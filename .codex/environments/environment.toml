# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "Exceptionless Aspire"

[setup]
script = '''
set -e

cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"

echo "Setting up Exceptionless Aspire worktree: $CODEX_WORKTREE_PATH"

if ! command -v dotnet >/dev/null 2>&1; then
  echo "dotnet is not installed or not on PATH. Exceptionless requires .NET 10." >&2
  exit 1
fi

if ! command -v node >/dev/null 2>&1; then
  echo "node is not installed or not on PATH. Exceptionless requires Node 24+." >&2
  exit 1
fi

if ! command -v npm >/dev/null 2>&1; then
  echo "npm is not installed or not on PATH." >&2
  exit 1
fi

echo "dotnet:"
dotnet --version

echo "node:"
node --version

echo "npm:"
npm --version

echo "Restoring .NET workloads..."
dotnet workload restore

echo "Restoring Exceptionless.slnx..."
dotnet restore Exceptionless.slnx -p:WarningsNotAsErrors=NU1903

echo "Installing Svelte frontend dependencies..."
npm ci --prefix src/Exceptionless.Web/ClientApp --prefer-offline --no-audit

echo "Installing legacy Angular frontend dependencies..."
npm ci --prefix src/Exceptionless.Web/ClientApp.angular --prefer-offline --no-audit

echo "Setup complete. Use the Run Aspire action to start the app, or Run Lume Docs to test the static site."
'''

[cleanup]
script = '''
set +e

cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"

echo "Cleaning Exceptionless worktree-local output only: $CODEX_WORKTREE_PATH"

echo "Removing repo-local temp/test output only..."

rm -rf .cache/tmp
rm -rf .aspire
rm -rf TestResults
rm -rf docs/_site
rm -rf docs/_cache

find . -type d \( -name TestResults -o -name .vite -o -name .svelte-kit \) -exec rm -rf {} +

echo "Cleanup complete."
echo "Aspire infrastructure containers and Docker volumes were intentionally left alone."
'''

[[actions]]
name = "Run Aspire"
icon = "run"
command = '''
set -e

cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"

export AppMode=Development
export DOTNET_ENVIRONMENT=Development
export ASPNETCORE_ENVIRONMENT=Development
export ASPIRE_HOME="$CODEX_WORKTREE_PATH/.aspire"

if command -v aspire >/dev/null 2>&1; then
  mkdir -p "$ASPIRE_HOME"
  aspire run --nologo --non-interactive
else
  dotnet run --project src/Exceptionless.AppHost/Exceptionless.AppHost.csproj
fi
'''

[[actions]]
name = "Run Lume Docs"
icon = "run"
command = '''
set -e

cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}/docs"

export PORT="${PORT:-7141}"

if ! command -v deno >/dev/null 2>&1; then
  echo "deno is not installed or not on PATH. The Lume docs site requires Deno." >&2
  exit 1
fi

echo "deno:"
deno --version

echo "Starting Lume docs at http://127.0.0.1:$PORT/"
deno task serve -- --port "$PORT"
'''

[[actions]]
name = "Stop Aspire Containers, keep data"
icon = "tool"
command = '''
if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
  docker stop \
    Exceptionless-Elasticsearch \
    Exceptionless-Kibana \
    Exceptionless-Redis \
    Exceptionless-RedisInsight \
    Redis-insight \
    Exceptionless-Storage \
    Exceptionless-Mail \
    2>/dev/null || true
fi
'''

[[actions]]
name = "Reset Aspire Containers, keep volumes"
icon = "tool"
command = '''
if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
  docker rm -f \
    Exceptionless-Elasticsearch \
    Exceptionless-Kibana \
    Exceptionless-Redis \
    Exceptionless-RedisInsight \
    Redis-insight \
    Exceptionless-Storage \
    Exceptionless-Mail \
    2>/dev/null || true
fi
'''

[[actions]]
name = "Hard reset Aspire data"
icon = "tool"
command = '''
if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
  docker rm -f \
    Exceptionless-Elasticsearch \
    Exceptionless-Kibana \
    Exceptionless-Redis \
    Exceptionless-RedisInsight \
    Redis-insight \
    Exceptionless-Storage \
    Exceptionless-Mail \
    2>/dev/null || true

  docker volume rm exceptionless.data.v1 2>/dev/null || true
fi
'''
