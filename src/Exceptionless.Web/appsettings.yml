---
Serilog:
  Using:
  - Serilog.Sinks.Console
  MinimumLevel:
    Default: Information
    Override:
      #Exceptionless.Core.Repositories.EventRepository: Verbose
      #Exceptionless.Core.Repositories.StackRepository: Verbose
      #Exceptionless.Core.Repositories: Verbose
      Exceptionless.Web.Program: Information
      Exceptionless.Web.Security.ApiKeyAuthenticationHandler: Warning
      Foundatio.Metrics: Warning
      Foundatio.Utility.ScheduledTimer: Warning
      Microsoft: Warning
      Microsoft.AspNetCore.Hosting.Diagnostics: Warning
      Microsoft.Hosting.Lifetime: Information
      OpenTelemetry: Information
      StackExchange.Redis: Warning
      StartupActions: Information
      System: Warning
  WriteTo:
  - Name: Console
    Args:
      theme: "Serilog.Sinks.SystemConsole.Themes.AnsiConsoleTheme::Literate, Serilog.Sinks.Console"
      outputTemplate: "[{Timestamp:HH:mm:ss} {Level:u3}] {Message:lj} <{SourceContext}>{NewLine}{Exception}"
  Enrich:
  - FromLogContext
  - WithMachineName
  - WithThreadId

Apm:
  ServiceName: exceptionless
  EnableLogs: true
  FullDetails: true
  Debug: false

EventIngestionV3:
  Enabled: false
  EnableProcessingStatus: false
  MicroBatchSize: 100
  MaximumMicroBatchBytes: 1048576
  MaximumEventSize: 524288
  MaximumCompressedBodySize: 10485760
  MaximumDecompressedBodySize: 52428800
  MaximumEventsPerRequest: 10000
  MaximumStackCreationConcurrency: 8
  RequestTimeout: 00:02:00
  IdempotencyWindow: 7.00:00:00
  StackRouteCacheDuration: 01:00:00
  NegativeStackRouteCacheDuration: 00:00:30
  AllowedProjectIds: []
  AllowedOrganizationIds: []
