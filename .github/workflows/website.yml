name: Website

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - website-preview
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/website.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true

      - name: Check
        run: deno task check

      - name: Verify
        run: deno task verify

      - name: Check unused assets
        run: deno run --allow-read scripts/find-unused.ts

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    name: Deploy website
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: ${{ github.ref == 'refs/heads/website-preview' }}
    environment:
      name: ${{ github.ref == 'refs/heads/website-preview' && 'github-pages-preview' || 'github-pages' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Retry deploy to GitHub Pages
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Retry deploy to GitHub Pages again
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Resolve deployment URL
        id: deployment
        if: always()
        run: echo "page_url=${PAGE_URL}" >> "$GITHUB_OUTPUT"
        env:
          PAGE_URL: ${{ steps.deploy_attempt_1.outputs.page_url || steps.deploy_attempt_2.outputs.page_url || steps.deploy_attempt_3.outputs.page_url || steps.pages.outputs.base_url }}
