name: Website

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      EXCEPTIONLESS_SITE_API_KEY:
        required: false
      PUBLIC_EXCEPTIONLESS_API_KEY:
        required: false
      EXCEPTIONLESS_SITE_SERVER_URL:
        required: false
      PUBLIC_EXCEPTIONLESS_SERVER_URL:
        required: false
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/website.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs
    env:
      EXCEPTIONLESS_SITE_API_KEY: ${{ secrets.EXCEPTIONLESS_SITE_API_KEY }}
      PUBLIC_EXCEPTIONLESS_API_KEY: ${{ secrets.PUBLIC_EXCEPTIONLESS_API_KEY }}
      EXCEPTIONLESS_SITE_SERVER_URL: ${{ secrets.EXCEPTIONLESS_SITE_SERVER_URL || vars.EXCEPTIONLESS_SITE_SERVER_URL }}
      PUBLIC_EXCEPTIONLESS_SERVER_URL: ${{ secrets.PUBLIC_EXCEPTIONLESS_SERVER_URL || vars.PUBLIC_EXCEPTIONLESS_SERVER_URL }}
      EXCEPTIONLESS_SITE_ENVIRONMENT: ${{ vars.EXCEPTIONLESS_SITE_ENVIRONMENT }}
      EXCEPTIONLESS_SITE_VERSION: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true

      - name: Check
        run: deno task check

      - name: Verify
        run: deno task verify

      - name: Check unused assets
        run: deno run --allow-read scripts/find-unused.ts

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    name: Deploy website
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
