name: Website

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - website-preview
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/website.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true

      - name: Check
        run: deno task check

      - name: Verify
        run: deno task verify

      - name: Check unused assets
        run: deno run --allow-read scripts/find-unused.ts

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    name: Deploy website
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
