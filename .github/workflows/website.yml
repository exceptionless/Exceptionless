name: Website

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/website.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs
    env:
      EXCEPTIONLESS_SITE_API_KEY: ${{ vars.EXCEPTIONLESS_SITE_API_KEY }}
      EXCEPTIONLESS_SITE_SERVER_URL: ${{ vars.EXCEPTIONLESS_SITE_SERVER_URL }}
      EXCEPTIONLESS_SITE_VERSION: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.5.7
          cache: true

      - name: Require telemetry configuration for deployment
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "$EXCEPTIONLESS_SITE_API_KEY" ]; then
            echo "EXCEPTIONLESS_SITE_API_KEY repository variable is required for website deployment." >&2
            exit 1
          fi

      - name: Check
        run: deno task check

      - name: Verify
        run: deno task verify

      - name: Verify configured telemetry bootstrap
        if: github.event_name == 'pull_request'
        env:
          EXCEPTIONLESS_SITE_API_KEY: 00000000000000000000000000000000
          EXCEPTIONLESS_SITE_SERVER_URL: https://collector.example.invalid
        run: deno task build && deno task verify:telemetry

      - name: Check unused assets
        run: deno run --allow-read scripts/find-unused.ts

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    name: Deploy website
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
