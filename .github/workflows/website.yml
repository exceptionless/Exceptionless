name: Website

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - website-preview
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/website.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true

      - name: Check
        run: deno task check

      - name: Verify
        run: deno task verify

      - name: Check unused assets
        run: deno run --allow-read scripts/find-unused.ts

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    name: Deploy website
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: ${{ github.ref == 'refs/heads/website-preview' }}
    environment:
      name: ${{ github.ref == 'refs/heads/website-preview' && 'github-pages-preview' || 'github-pages' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          set -euo pipefail

          artifact_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" --jq '([.artifacts[] | select(.name == "github-pages") | .id] | first)')
          if [[ -z "${artifact_id}" || "${artifact_id}" == "null" ]]; then
            echo "::error::Unable to find github-pages artifact for this workflow run."
            exit 1
          fi

          oidc_token=$(curl -fsSL -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.value')
          if [[ -z "${oidc_token}" || "${oidc_token}" == "null" ]]; then
            echo "::error::Unable to request an OIDC token for GitHub Pages deployment."
            exit 1
          fi

          jq -n \
            --argjson artifact_id "${artifact_id}" \
            --arg pages_build_version "${GITHUB_SHA}" \
            --arg oidc_token "${oidc_token}" \
            '{ artifact_id: $artifact_id, pages_build_version: $pages_build_version, oidc_token: $oidc_token }' \
            | gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/deployments" --input - >/dev/null

          echo "page_url=${PAGES_BASE_URL}" >> "${GITHUB_OUTPUT}"

          deadline=$((SECONDS + 1800))
          while true; do
            status=$(gh api "repos/${GITHUB_REPOSITORY}/pages/deployments/${GITHUB_SHA}" --jq '.status')
            echo "Current status: ${status}"

            case "${status}" in
              deployment_content_ready|deployment_successful|success|succeed)
                exit 0
                ;;
              deployment_cancelled|deployment_failed|cancelled|failed|error|errored)
                echo "::error::GitHub Pages deployment ended with status ${status}."
                exit 1
                ;;
            esac

            if (( SECONDS >= deadline )); then
              echo "::error::Timed out waiting for GitHub Pages deployment after 30 minutes."
              exit 1
            fi

            sleep 15
          done
