name: Stop Dev Environment

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedules are UTC-only. These entries keep the workflow aligned
    # with 5am America/Chicago while limiting duplicate runs to DST transition months.
    - cron: "0 10 * 4-10 *"
    - cron: "0 11 * 12,1,2 *"
    - cron: "0 10,11 * 3,11 *"

permissions:
  contents: read

env:
  CLUSTER_NAME: ex-k8s-v6
  RESOURCE_GROUP: exceptionless-v6
  NAMESPACE: ex-dev
  AUTO_STOP_DAYS: 1

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Schedule Window
        id: schedule_window
        if: ${{ github.event_name == 'schedule' }}
        run: |
          CURRENT_HOUR=$(TZ=America/Chicago date +%H)
          if [ "$CURRENT_HOUR" = "05" ]; then
            echo "Running scheduled stop during the 5am America/Chicago window."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping scheduled stop outside the 5am America/Chicago window."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_window.outputs.should_run == 'true' }}
        run: az login --service-principal --username ${{ secrets.AZ_USERNAME }} --password ${{ secrets.AZ_PASSWORD }} --tenant ${{ secrets.AZ_TENANT }} --output none

      - name: Get AKS Credentials
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_window.outputs.should_run == 'true' }}
        run: az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --overwrite-existing

      - name: Check if Environment is Running
        id: check
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_window.outputs.should_run == 'true' }}
        run: |
          REPLICAS=$(kubectl get deployment/ex-dev-app --namespace $NAMESPACE -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
          echo "app_replicas=$REPLICAS" >> $GITHUB_OUTPUT

          if [ "$REPLICAS" = "0" ]; then
            echo "Environment is already stopped."
            echo "running=false" >> $GITHUB_OUTPUT
          else
            echo "Environment is running (app replicas: $REPLICAS)."
            echo "running=true" >> $GITHUB_OUTPUT
          fi

      - name: Check Auto-Stop Threshold
        id: auto_stop
        if: ${{ github.event_name == 'schedule' && steps.schedule_window.outputs.should_run == 'true' && steps.check.outputs.running == 'true' }}
        run: |
          STARTED_AT=$(kubectl get namespace $NAMESPACE -o jsonpath='{.metadata.annotations.exceptionless\.io/dev-started-at}' 2>/dev/null || echo "")

          if [ -z "$STARTED_AT" ]; then
            echo "No start annotation found. Stopping as a safety measure."
            echo "should_stop=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          STARTED_EPOCH=$(date -d "$STARTED_AT" +%s)
          NOW_EPOCH=$(date +%s)
          ELAPSED_DAYS=$(( (NOW_EPOCH - STARTED_EPOCH) / 86400 ))

          echo "Started at: $STARTED_AT ($ELAPSED_DAYS days ago)"

          # Check the retention days from the start annotation, fall back to default.
          AUTO_DAYS=$(kubectl get namespace $NAMESPACE -o jsonpath='{.metadata.annotations.exceptionless\.io/dev-auto-stop-days}' 2>/dev/null || echo "")
          if [ -z "$AUTO_DAYS" ]; then
            LEGACY_AUTO_HOURS=$(kubectl get namespace $NAMESPACE -o jsonpath='{.metadata.annotations.exceptionless\.io/dev-auto-stop-hours}' 2>/dev/null || echo "")
            if [ -n "$LEGACY_AUTO_HOURS" ]; then
              if [ "$LEGACY_AUTO_HOURS" = "0" ]; then
                AUTO_DAYS="$AUTO_STOP_DAYS"
              else
                AUTO_DAYS=$(( (LEGACY_AUTO_HOURS + 23) / 24 ))
              fi
            else
              AUTO_DAYS="$AUTO_STOP_DAYS"
            fi
          fi

          if ! [[ "$AUTO_DAYS" =~ ^[0-9]+$ ]] || [ "$AUTO_DAYS" -lt 1 ]; then
            echo "Invalid auto-stop retention '$AUTO_DAYS'. Falling back to default of $AUTO_STOP_DAYS day(s)."
            AUTO_DAYS="$AUTO_STOP_DAYS"
          fi

          if [ "$ELAPSED_DAYS" -ge "$AUTO_DAYS" ]; then
            echo "Auto-stop threshold exceeded ($ELAPSED_DAYS >= $AUTO_DAYS days). Stopping."
            echo "should_stop=true" >> $GITHUB_OUTPUT
          else
            echo "Within auto-stop window ($ELAPSED_DAYS < $AUTO_DAYS days). Keeping alive."
            echo "should_stop=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip (Not Time Yet)
        if: ${{ github.event_name == 'schedule' && (steps.schedule_window.outputs.should_run != 'true' || steps.auto_stop.outputs.should_stop != 'true') }}
        run: |
          if [ "${{ steps.schedule_window.outputs.should_run }}" != "true" ]; then
            echo "Skipping — outside the 5am America/Chicago window."
          else
            echo "Skipping — environment not running or within auto-stop window."
          fi

      - name: Stop Deployments
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_stop.outputs.should_stop == 'true' }}
        run: |
          kubectl scale deployment/ex-dev-app --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-api --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-close-inactive-sessions --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-daily-summary --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-event-notifications --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-event-usage --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-event-posts --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-event-user-descriptions --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-mail-message --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-stack-event-count --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-web-hooks --replicas=0 --namespace $NAMESPACE
          kubectl scale deployment/ex-dev-jobs-work-item --replicas=0 --namespace $NAMESPACE

      - name: Suspend CronJobs
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_stop.outputs.should_stop == 'true' }}
        run: |
          kubectl patch cronjob/ex-dev-jobs-cleanup-data -p '{"spec":{"suspend": true}}' --namespace $NAMESPACE
          kubectl patch cronjob/ex-dev-jobs-cleanup-orphaned-data -p '{"spec":{"suspend": true}}' --namespace $NAMESPACE
          kubectl patch cronjob/ex-dev-jobs-download-geoip-database -p '{"spec":{"suspend": true}}' --namespace $NAMESPACE
          kubectl patch cronjob/ex-dev-jobs-maintain-indexes -p '{"spec":{"suspend": true}}' --namespace $NAMESPACE
          kubectl patch cronjob/ex-dev-jobs-migration -p '{"spec":{"suspend": true}}' --namespace $NAMESPACE

      - name: Stop Infrastructure (Kibana, ES, Redis)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_stop.outputs.should_stop == 'true' }}
        run: |
          kubectl scale deployment/ex-dev-kb --replicas=0 --namespace $NAMESPACE
          kubectl scale statefulset/ex-dev-es-main --replicas=0 --namespace $NAMESPACE
          kubectl delete -f k8s/ex-dev-redis.yaml --ignore-not-found

      - name: Clear Start Annotation
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_stop.outputs.should_stop == 'true' }}
        run: |
          kubectl annotate namespace $NAMESPACE exceptionless.io/dev-started-at- --overwrite 2>/dev/null || true
          kubectl annotate namespace $NAMESPACE exceptionless.io/dev-auto-stop-days- --overwrite 2>/dev/null || true
          kubectl annotate namespace $NAMESPACE exceptionless.io/dev-auto-stop-hours- --overwrite 2>/dev/null || true

      - name: Summary
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_stop.outputs.should_stop == 'true' }}
        run: |
          TRIGGER="${{ github.event_name }}"
          if [ "$TRIGGER" = "schedule" ]; then
            REASON="auto-stop threshold exceeded"
          else
            REASON="manual stop"
          fi
          echo "### Dev Environment Stopped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason**: $REASON" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
