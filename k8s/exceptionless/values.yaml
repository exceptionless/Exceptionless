version: latest

app:
  defaultDomain:
  domains: []
  image:
    repository: exceptionless/app
    pullPolicy: IfNotPresent

api:
  defaultDomain:
  domains: []
  image:
    repository: exceptionless/api
    pullPolicy: IfNotPresent

