services:
  elasticsearch:
    image: exceptionless/elasticsearch:8.19.15
    environment:
      node.name: elasticsearch
      cluster.name: exceptionless
      discovery.type: single-node
      xpack.security.enabled: "false"
      action.destructive_requires_name: false
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - 9200:9200
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s" > /dev/null',
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  kibana:
    depends_on:
      - elasticsearch
    image: docker.elastic.co/kibana/kibana:8.19.15
    environment:
      xpack.security.enabled: "false"
    ports:
      - 5601:5601

  redis:
    image: redis:8.6-alpine
    ports:
      - 6379:6379

  mail:
    image: axllent/mailpit:v1.27.10
    ports:
      - 8025:8025
      - 1025:1025

volumes:
  esdata:
    driver: local
